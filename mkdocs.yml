site_name: EPLAN 2026 - Книга
site_url: https://serhioromano.github.io/eplan-2026-book/
site_author: Сергей Романов
site_description: >-
  Книга для EPLAN 2026.

# Repository
repo_name: serhioromano/eplan-2026-book
repo_url: https://github.com/serhioromano/eplan-2026-book
edit_uri: edit/main/book/

# навигация тут
nav:
  - "Введение Eplan":
    - "Указания по ознакомлению с руководством": 2026/helpsystem_k_hinweise.md
    - "Использование справочной системы":

plugins:
  - search:
      lang: ru
  - meta
  - git-authors
  - git-revision-date-localized:
      fallback_to_build_date: true
  - git-committers:
      repository: serhioromano/eplan-2026-book
      branch: main
      token: !ENV GH_TOKEN

markdown_extensions:
  - abbr
  - attr_list
  - tables
  - admonition
  - md_in_html
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.keys
  - def_list
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.highlight:
      use_pygments: false
  - pymdownx.tasklist:
      custom_checkbox: true

# extra_javascript:
#   - javascripts/hjs.js
#   - javascripts/hl.js

extra_css:
  - stylesheets/code.css

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@serhioromano
  generator: false
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
copyright: >
  Все права защищены &copy; 2026

theme:
  name: material
  language: ru
  logo: assets/logo35.png
  palette:

    # Palette toggle for light mode
    - scheme: default
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-7
        name: Темный режим

    # Palette toggle for dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-4
        name: Светлый режим

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.expand
    # - navigation.sections
    - navigation.tracking
    - navigation.path
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.tooltips
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips